<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Link media example</title>
  <link rel="stylesheet" href="screen.css">
  <link rel="stylesheet" href="print.css" media="print">
</head>
<body>
  <h1>Hello</h1>
  <p>This paragraph reads black on screen, dark green in print.</p>
</body>
</html>
