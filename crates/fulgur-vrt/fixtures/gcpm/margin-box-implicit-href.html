<!DOCTYPE html>
<html>
<head>
<!--
  fulgur-qgy7: VRT golden for `target-text(attr(href))` evaluated
  inside an `@page` margin box.

  `@top-center` has no link element to read `href` from, so the
  renderer supplies the first `<a href="#...">` whose enclosing block
  lands on the current page as the implicit reference. Pass 2 then
  resolves the section title via the AnchorMap and the margin box
  prints `Header: My Section Title` on page 1. Page 2 carries no
  `<a href>`, so its margin box collapses to empty.
-->
<style>
@page { size: A5; margin: 18mm; @top-center { content: "Header: " target-text(attr(href)); } }
body { font: 12pt 'Noto Sans', sans-serif; }
</style>
</head>
<body>
<p><a href="#sec1">Jump to section</a></p>
<h2 id="sec1" style="page-break-before: always">My Section Title</h2>
<p>section body</p>
</body>
</html>
