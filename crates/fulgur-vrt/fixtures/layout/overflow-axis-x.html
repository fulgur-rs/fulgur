<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>VRT fixture: layout/overflow-axis-x</title>
<style>
  html,body{margin:0;padding:0}
  .row{display:flex;gap:20px;padding:60px}
  /* X-axis clip only; Y-axis "visible" — per CSS Overflow §3 the
     visible value may be promoted to auto when the other axis is
     non-visible. Locks current fulgur behavior either way. */
  .container{width:120px;height:120px;border:2px solid #333;background:#eef;overflow-x:hidden;overflow-y:visible}
  .big{width:240px;height:240px;background:#e33}
</style>
</head><body><div class="row">
<div class="container"><div class="big"></div></div>
</div></body></html>
