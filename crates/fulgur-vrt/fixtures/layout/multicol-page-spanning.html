<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<title>VRT fixture: layout/multicol-page-spanning</title>
<style>
  /* small page forces multicol to span ≥2 pages */
  @page{size:200pt 180pt;margin:10pt}
  html,body{margin:0;padding:0}
  .m{column-count:2;column-gap:16px}
  .b{height:40px;margin-bottom:8px;background:#37474f}
</style>
</head><body><div class="m">
<div class="b"></div><div class="b"></div>
<div class="b"></div><div class="b"></div>
<div class="b"></div><div class="b"></div>
<div class="b"></div><div class="b"></div>
<div class="b"></div><div class="b"></div>
<div class="b"></div><div class="b"></div>
</div></body></html>
