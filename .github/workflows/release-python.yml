name: Release (Python / PyPI)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Publish to TestPyPI instead of PyPI'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux: "2014"
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            manylinux: "2014"
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --strip --out dist -m crates/pyfulgur/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/pyfulgur/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  smoke-test:
    name: Smoke test (${{ matrix.os }})
    needs: [build-wheels]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: wheels-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            artifact: wheels-aarch64-unknown-linux-gnu
          - os: macos-13
            artifact: wheels-x86_64-apple-darwin
          - os: macos-latest
            artifact: wheels-aarch64-apple-darwin
          - os: windows-latest
            artifact: wheels-x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install wheel (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: pip install dist/*.whl
      - name: Install wheel (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pip install (Get-ChildItem dist/*.whl)[0].FullName
      - name: Smoke test
        shell: bash
        run: |
          python -c "
          import pyfulgur
          engine = pyfulgur.Engine()
          pdf = engine.render_html('<p>hi</p>')
          assert isinstance(pdf, (bytes, bytearray)), type(pdf)
          assert len(pdf) > 100, len(pdf)
          print(f'OK: {len(pdf)} bytes')
          "

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist, smoke-test]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build-wheels, build-sdist, smoke-test]
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
