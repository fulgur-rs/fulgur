[tools]
rust = "latest"
python = "3.12"
uv = "latest"

[tasks.update-examples]
description = "Regenerate all example PDFs"
run = """
#!/usr/bin/env bash
set -euo pipefail
cargo build --bin fulgur --release
mkdir -p target/fontconfig-cache
rm -rf target/fontconfig-cache/*
export FONTCONFIG_FILE="$PWD/examples/.fontconfig/fonts.conf"
for dir in examples/*/; do
  html="$dir/index.html"
  pdf="$dir/index.pdf"
  [ -f "$html" ] || continue
  # Skip hidden directories (.fonts, .fontconfig).
  [ "${dir#examples/.}" = "$dir" ] || continue
  args=()
  for img in "${dir}"*.png "${dir}"*.jpg "${dir}"*.gif "${dir}"*.svg; do
    [ -f "$img" ] || continue
    args+=(--image "$(basename "$img")=$img")
  done
  if [ -f "${dir}fulgur.args" ]; then
    while IFS= read -r line; do
      [[ -z "$line" || "$line" == '#'* ]] && continue
      set -f; args+=($line); set +f
    done < "${dir}fulgur.args"
  fi
  target/release/fulgur render "$html" "${args[@]}" -o "$pdf"
done
"""

[tasks."wpt:fetch"]
description = "Fetch WPT sources into target/wpt/ (pinned SHA)"
run = "scripts/wpt/fetch.sh"

[tasks."wpt:run-one"]
description = "Run a single WPT reftest (usage: mise run wpt:run-one -- <test.html> [--dpi N])"
run = """
#!/usr/bin/env bash
set -euo pipefail
if [ $# -eq 0 ]; then
  echo "usage: mise run wpt:run-one -- <test.html> [--dpi N]" >&2
  echo "  test.html: path under target/wpt/ or absolute" >&2
  exit 1
fi
export FONTCONFIG_FILE="$PWD/examples/.fontconfig/fonts.conf"
cargo run -p fulgur-wpt --example run_one -- "$@"
"""

[tasks."docs:install"]
description = "Install website Python deps via uv"
dir = "website"
run = "uv sync"

[tasks."docs:serve"]
description = "Run MkDocs dev server (http://127.0.0.1:8000)"
dir = "website"
depends = ["docs:install"]
run = "uv run mkdocs serve"

[tasks."docs:build"]
description = "Build static site to website/site/"
dir = "website"
depends = ["docs:install"]
run = "uv run mkdocs build --strict"
